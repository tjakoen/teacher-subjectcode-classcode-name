name: Models check

# A 20-second smoke test: does GitHub Models work from this repo on the built-in
# GITHUB_TOKEN? Makes ONE tiny inference call and prints the HTTP status + body.
# It grades nothing and pushes nothing - it only tells you whether the AI
# feedback feature will be able to run here. Trigger it from the Actions tab.
on:
  workflow_dispatch:

permissions:
  models: read     # lets the built-in token try Models (works only if the org/enterprise allows it)

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Prefer a personal PAT (account-level Models access, bypasses org policy);
      # fall back to the built-in token when no PAT secret is set.
      MODELS_TOKEN: ${{ secrets.MODELS_PAT || secrets.GITHUB_TOKEN }}
      PAT_PRESENT: ${{ secrets.MODELS_PAT != '' }}
      MODELS_ENDPOINT: "https://models.github.ai/inference/chat/completions"
      MODELS_NAME: "openai/gpt-4o-mini"
    steps:
      - name: Call the Models endpoint once
        run: |
          node <<'EOF' | tee -a "$GITHUB_STEP_SUMMARY"
          // stdin scripts run as CommonJS (no top-level await), so wrap in an IIFE.
          (async () => {
            const endpoint = process.env.MODELS_ENDPOINT;
            const model = process.env.MODELS_NAME;
            const token = process.env.MODELS_TOKEN || "";
            const log = (s) => console.log(s);
            log(`## Models check`);
            log("");
            const usingPat = process.env.PAT_PRESENT === "true";
            log(`- Endpoint: \`${endpoint}\``);
            log(`- Model: \`${model}\``);
            log(`- Token source: **${usingPat ? "MODELS_PAT secret (personal PAT)" : "built-in GITHUB_TOKEN"}**`);
            log(`- Token present: **${token ? "yes" : "NO"}**`);
            log("");
            try {
              const res = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                body: JSON.stringify({
                  model,
                  max_tokens: 16,
                  messages: [{ role: "user", content: "Reply with exactly: OK" }],
                }),
              });
              const body = await res.text();
              log(`**HTTP ${res.status} ${res.statusText}**`);
              log("");
              const hdr = ["www-authenticate", "x-ratelimit-remaining", "x-github-request-id"]
                .map((h) => [h, res.headers.get(h)]).filter(([, v]) => v);
              if (hdr.length) { log("Response headers:"); log("```"); hdr.forEach(([h, v]) => log(`${h}: ${v}`)); log("```"); log(""); }
              if (!body) log("_(empty response body)_");
              if (res.ok) {
                let reply = "";
                try { reply = JSON.parse(body).choices?.[0]?.message?.content ?? ""; } catch {}
                log(`✅ Models works on the built-in token. Model said: \`${reply.trim()}\``);
                log("");
                log("You're clear to run the grade sweep dry run for AI feedback.");
              } else {
                log(`❌ Models did **not** work. Response body:`);
                log("");
                log("```");
                log(body.slice(0, 1500));
                log("```");
                log("");
                log("Common causes: GitHub Models not enabled for the org/enterprise,");
                log("or the built-in token is restricted. Fix that, or switch");
                log("`MODELS_TOKEN` to a PAT secret with the Models permission.");
              }
            } catch (e) {
              log(`❌ Request threw: \`${e.message}\``);
            }
          })();
          EOF
